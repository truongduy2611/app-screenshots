name: app_screenshots
description: "App Screenshots — Design beautiful App Store screenshots."
publish_to: 'none'
version: 1.1.1+3

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & DI
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  equatable: ^2.0.7

  # Persistence
  shared_preferences: ^2.5.3
  path: ^1.9.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.3.3
  material_symbols_icons: ^4.2801.0
  flutter_colorpicker: ^1.1.0
  device_frame:
    path: packages/device_frame
  flutter_sficon: ^1.3.0

  # Editor
  screenshot: ^3.0.0
  desktop_drop: ^0.7.0
  file_picker: ^10.3.7
  image: ^4.5.4
  share_plus: ^12.0.1

  # Utilities
  uuid: ^4.5.2
  http: ^1.6.0
  crypto: ^3.0.6
  dart_jsonwebtoken: ^3.3.1
  intl: any
  pasteboard: ^0.4.0

  # URL launching & review prompt
  url_launcher: ^6.3.1
  in_app_review: ^2.0.10
  flutter_staggered_grid_view: ^0.7.0
  objective_c: 9.1.0
  path_provider_foundation: 2.5.1
  archive: ^4.0.9
  mesh_gradient: ^1.3.8
  app_screenshots_shared:
    path: packages/app_screenshots_shared


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - app-icon.png
    - main-icon.png
